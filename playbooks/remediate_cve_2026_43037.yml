---
- name: Remediate CVE-2026-43037 - Linux kernel IPv6 tunnel buffer overflow
  hosts: all
  become: true

  tasks:
    - name: Apply all available security updates
      ansible.builtin.dnf:
        name: "*"
        security: true
        state: latest
      register: dnf_result

    - name: Show packages updated
      ansible.builtin.debug:
        msg: "{{ dnf_result.results | default(['No updates applied']) }}"

    - name: Check if reboot is required
      ansible.builtin.command:
        cmd: needs-restarting -r
      register: reboot_check
      changed_when: false
      failed_when: false

    - name: Reboot if kernel was updated
      ansible.builtin.reboot:
        reboot_timeout: 300
        msg: "Rebooting to apply kernel update for CVE-2026-43037"
      when: reboot_check.rc == 1

    - name: Show kernel version after update
      ansible.builtin.command:
        cmd: uname -r
      register: kernel_version
      changed_when: false

    - name: Confirm kernel version
      ansible.builtin.debug:
        msg: "Kernel is now: {{ kernel_version.stdout }}"
